<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bomb Sweep</title>
<style>
  /* ═══════════════════════════════════════════
     RESET & BASE
     ═══════════════════════════════════════════ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1a;
    --surface: #1a1a2e;
    --surface-light: #22223a;
    --accent: #e94560;
    --accent-glow: rgba(233, 69, 96, 0.4);
    --safe: #0f9b58;
    --safe-glow: rgba(15, 155, 88, 0.35);
    --gold: #ffd700;
    --gold-glow: rgba(255, 215, 0, 0.4);
    --text: #eaeaea;
    --text-muted: #8888aa;
    --border: #333355;
    --cell-bg: #2a2a4a;
    --cell-hover: #3a3a5e;
    --cell-revealed: #151528;
    --radius: 8px;
    --transition: 0.3s ease;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ═══════════════════════════════════════════
     ANIMATED BACKGROUND
     ═══════════════════════════════════════════ */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════
     LAYOUT
     ═══════════════════════════════════════════ */
  .app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    min-height: 100vh;
  }

  /* ═══════════════════════════════════════════
     HEADER
     ═══════════════════════════════════════════ */
  .header {
    text-align: center;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), #ff6b6b, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1.1;
  }

  .header p {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  /* ═══════════════════════════════════════════
     STATUS BAR
     ═══════════════════════════════════════════ */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }

  .status-item {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .status-item .icon { font-size: 1.1rem; }
  .status-item .label { color: var(--text-muted); }
  .status-item .value { font-weight: 700; }

  .server-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .server-badge.online {
    background: rgba(15, 155, 88, 0.15);
    color: var(--safe);
    border: 1px solid rgba(15, 155, 88, 0.3);
  }

  .server-badge.offline {
    background: rgba(255, 165, 0, 0.15);
    color: orange;
    border: 1px solid rgba(255, 165, 0, 0.3);
  }

  .server-badge .pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: pulse-anim 2s infinite;
  }

  .server-badge.online .pulse { background: var(--safe); }
  .server-badge.offline .pulse { background: orange; }

  @keyframes pulse-anim {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  /* ═══════════════════════════════════════════
     PROGRESS BAR
     ═══════════════════════════════════════════ */
  .progress-wrapper {
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .progress-track {
    width: 100%;
    height: 10px;
    background: var(--surface);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--safe), #4ade80, var(--gold));
    border-radius: 10px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ═══════════════════════════════════════════
     GRID
     ═══════════════════════════════════════════ */
  .grid-container {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1;
  }

  .cell {
    position: relative;
    background: var(--cell-bg);
    border-radius: var(--radius);
    border: 2px solid transparent;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 800;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    perspective: 600px;
    overflow: hidden;
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: var(--radius);
    opacity: 0;
    transition: opacity 0.2s;
    background: radial-gradient(circle at center, rgba(255,255,255,0.08), transparent 70%);
  }

  .cell:hover:not(.revealed):not(.disabled)::before {
    opacity: 1;
  }

  .cell:hover:not(.revealed):not(.disabled) {
    background: var(--cell-hover);
    border-color: rgba(255, 255, 255, 0.1);
    transform: translateY(-2px);
  }

  .cell:active:not(.revealed):not(.disabled) {
    transform: scale(0.95);
  }

  .cell:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 2px;
  }

  /* ── Revealed States ── */
  .cell.revealed {
    background: var(--cell-revealed);
    cursor: default;
    animation: cell-reveal 0.4s ease forwards;
  }

  @keyframes cell-reveal {
    0% { transform: rotateY(90deg) scale(0.8); opacity: 0.5; }
    50% { transform: rotateY(-5deg) scale(1.02); }
    100% { transform: rotateY(0deg) scale(1); opacity: 1; }
  }

  .cell.bomb-hit {
    background: rgba(233, 69, 96, 0.25);
    border-color: var(--accent);
    animation: bomb-shake 0.6s ease;
  }

  @keyframes bomb-shake {
    0%, 100% { transform: translateX(0); }
    10% { transform: translateX(-6px) rotate(-2deg); }
    20% { transform: translateX(6px) rotate(2deg); }
    30% { transform: translateX(-5px) rotate(-1deg); }
    40% { transform: translateX(5px) rotate(1deg); }
    50% { transform: translateX(-3px); }
    60% { transform: translateX(3px); }
    70% { transform: translateX(-1px); }
  }

  .cell.bomb-reveal {
    background: rgba(233, 69, 96, 0.12);
    border-color: rgba(233, 69, 96, 0.3);
  }

  .cell.safe-reveal-end {
    background: rgba(233, 69, 96, 0.05);
    border-color: rgba(233, 69, 96, 0.15);
  }

  .cell.disabled { pointer-events: none; }

  /* ── Adjacent number colors ── */
  .cell .num { font-size: 1.25rem; font-weight: 800; }
  .num-1 { color: #5bc0de; }
  .num-2 { color: #5cb85c; }
  .num-3 { color: #f0ad4e; }
  .num-4 { color: #e94560; }
  .num-0 { color: rgba(255,255,255,0.1); font-size: 0.8rem; }

  /* ═══════════════════════════════════════════
     BUTTONS
     ═══════════════════════════════════════════ */
  .actions {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    padding: 10px 24px;
    border: none;
    border-radius: 30px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #ff6b6b);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 28px var(--accent-glow);
  }

  .btn-secondary {
    background: var(--surface-light);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--cell-hover);
    transform: translateY(-1px);
  }

  /* ═══════════════════════════════════════════
     MODAL
     ═══════════════════════════════════════════ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    max-width: 380px;
    width: 90%;
    transform: scale(0.8) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal-overlay.active .modal {
    transform: scale(1) translateY(0);
  }

  .modal .emoji {
    font-size: 4rem;
    margin-bottom: 16px;
    display: block;
  }

  .modal h2 {
    font-size: 1.8rem;
    font-weight: 900;
    margin-bottom: 8px;
  }

  .modal.win h2 { color: var(--gold); }
  .modal.lose h2 { color: var(--accent); }

  .modal p {
    color: var(--text-muted);
    font-size: 0.95rem;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  /* ═══════════════════════════════════════════
     TOAST
     ═══════════════════════════════════════════ */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.85rem;
    color: var(--text);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: toast-in 0.4s ease, toast-out 0.3s ease 2.7s forwards;
    max-width: 300px;
  }

  .toast.error { border-color: var(--accent); }
  .toast.success { border-color: var(--safe); }

  @keyframes toast-in {
    from { transform: translateX(100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes toast-out {
    from { opacity: 1; }
    to { opacity: 0; transform: translateY(-10px); }
  }

  /* ═══════════════════════════════════════════
     ACTIVITY LOG
     ═══════════════════════════════════════════ */
  .log-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 50;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1.2rem;
    transition: all 0.25s;
  }

  .log-toggle:hover {
    background: var(--surface-light);
    transform: scale(1.1);
  }

  .log-panel {
    position: fixed;
    bottom: 74px;
    right: 20px;
    z-index: 50;
    width: 340px;
    max-height: 300px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }

  .log-panel.open { display: flex; }

  .log-header {
    padding: 10px 14px;
    font-weight: 700;
    font-size: 0.85rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .log-body {
    overflow-y: auto;
    padding: 8px;
    flex: 1;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
  }

  .log-entry {
    padding: 3px 6px;
    border-radius: 4px;
    margin-bottom: 2px;
    word-break: break-all;
  }

  .log-entry.error { color: var(--accent); }
  .log-entry.success { color: var(--safe); }
  .log-entry.info { color: #5bc0de; }

  /* ═══════════════════════════════════════════
     PARTICLE LAYER
     ═══════════════════════════════════════════ */
  #particle-canvas {
    position: fixed;
    inset: 0;
    z-index: 90;
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════
     RESPONSIVE
     ═══════════════════════════════════════════ */
  @media (max-width: 520px) {
    .header h1 { font-size: 1.8rem; }
    .grid-container { gap: 4px; max-width: 340px; }
    .cell { font-size: 1rem; }
    .cell .num { font-size: 1rem; }
    .status-bar { gap: 8px; }
    .status-item { padding: 4px 10px; font-size: 0.8rem; }
    .modal { padding: 28px 20px; }
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>BOMB SWEEP</h1>
    <p>Find all safe cells. Hit the bomb and it's over. Survive to win a 5-Star Chocolate!</p>
  </div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span id="server-badge" class="server-badge offline">
      <span class="pulse"></span>
      <span id="server-label">Checking...</span>
    </span>
    <div class="status-item">
      <span class="icon">🏆</span>
      <span class="label">Best:</span>
      <span class="value" id="best-streak">0</span>
    </div>
    <div class="status-item">
      <span class="icon">🔥</span>
      <span class="label">Streak:</span>
      <span class="value" id="current-streak">0</span>
    </div>
    <div class="status-item">
      <span class="icon">🎮</span>
      <span class="label">Played:</span>
      <span class="value" id="games-played">0</span>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="progress-wrapper">
    <div class="progress-label">
      <span>Safe cells revealed</span>
      <span id="progress-text">0 / 63</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid-container" id="grid"></div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="btn-new" onclick="startNewGame()">💣 New Game</button>
    <button class="btn btn-secondary" id="btn-reveal" onclick="revealAllCells()" style="display:none;">👁 Reveal Board</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <span class="emoji" id="modal-emoji">🍫</span>
    <h2 id="modal-title">You Win!</h2>
    <p id="modal-text">You swept all the bombs! Here's your 5-Star Chocolate!</p>
    <button class="btn btn-primary" onclick="closeModal(); startNewGame();">Play Again</button>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<!-- Log Panel -->
<button class="log-toggle" id="log-toggle" onclick="toggleLog()">📋</button>
<div class="log-panel" id="log-panel">
  <div class="log-header">
    <span>Activity Log</span>
    <span style="cursor:pointer;" onclick="clearLog()">Clear</span>
  </div>
  <div class="log-body" id="log-body"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   GAME STATE
   ═══════════════════════════════════════════ */
const GRID_SIZE = 8;
const TOTAL_CELLS = GRID_SIZE * GRID_SIZE;
const TOTAL_SAFE = TOTAL_CELLS - 1;

let gameId = null;
let gridState = [];       // 'hidden' | 'revealed' | 'bomb'
let adjacentMap = {};      // cell_index → adjacent count
let revealedCount = 0;
let gameOver = false;
let serverOnline = false;
let bestStreak = parseInt(localStorage.getItem('bombSweep_best') || '0');

document.getElementById('best-streak').textContent = bestStreak;

/* ═══════════════════════════════════════════
   BACKGROUND PARTICLES
   ═══════════════════════════════════════════ */
(function initBg() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let embers = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  class Ember {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = canvas.height + Math.random() * 100;
      this.size = Math.random() * 2.5 + 0.5;
      this.speedY = Math.random() * 0.5 + 0.2;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.4 + 0.1;
      this.hue = Math.random() > 0.5 ? 0 : 30;
    }
    update() {
      this.y -= this.speedY;
      this.x += this.speedX + Math.sin(this.y * 0.01) * 0.2;
      this.opacity -= 0.0005;
      if (this.y < -10 || this.opacity <= 0) this.reset();
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${this.opacity})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < 60; i++) embers.push(new Ember());

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    embers.forEach(e => { e.update(); e.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ═══════════════════════════════════════════
   PARTICLE BURST EFFECTS
   ═══════════════════════════════════════════ */
const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticleCanvas() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticleCanvas();
window.addEventListener('resize', resizeParticleCanvas);

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.size = Math.random() * 5 + 2;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.gravity = 0.12;
    this.life = 1;
    this.decay = Math.random() * 0.02 + 0.015;
  }
  update() {
    this.x += this.vx;
    this.vy += this.gravity;
    this.y += this.vy;
    this.vx *= 0.98;
    this.life -= this.decay;
  }
  draw() {
    pCtx.globalAlpha = Math.max(0, this.life);
    pCtx.fillStyle = this.color;
    pCtx.beginPath();
    pCtx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    pCtx.fill();
  }
}

function burstAt(el, colors, count) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < count; i++) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    particles.push(new Particle(cx, cy, color));
  }
}

function celebrationBurst() {
  const colors = ['#ffd700', '#ff6b6b', '#4ade80', '#5bc0de', '#f0ad4e', '#e94560', '#ffffff'];
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * window.innerWidth;
    const y = window.innerHeight + 20;
    const p = new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]);
    p.vy = -(Math.random() * 12 + 5);
    p.vx = (Math.random() - 0.5) * 8;
    p.gravity = 0.08;
    p.size = Math.random() * 4 + 2;
    particles.push(p);
  }
}

function animateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.update(); p.draw(); });
  pCtx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* ═══════════════════════════════════════════
   API LAYER
   ═══════════════════════════════════════════ */
async function api(endpoint, body = null) {
  const opts = { method: 'POST', headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(endpoint, opts);
  return res.json();
}

async function checkServer() {
  try {
    const res = await fetch('/api/stats');
    if (!res.ok) throw new Error('Not OK');
    const data = await res.json();
    serverOnline = true;
    const badge = document.getElementById('server-badge');
    badge.className = 'server-badge online';
    document.getElementById('server-label').textContent = 'Server Online';
    document.getElementById('best-streak').textContent = data.best_streak || bestStreak;
    document.getElementById('current-streak').textContent = data.current_streak || 0;
    document.getElementById('games-played').textContent = data.games_played || 0;
    addLog('Connected to Flask backend', 'success');
  } catch (e) {
    serverOnline = false;
    const badge = document.getElementById('server-badge');
    badge.className = 'server-badge offline';
    document.getElementById('server-label').textContent = 'Local Mode';
    addLog('Flask server unreachable — using local mode', 'error');
  }
}

/* ═══════════════════════════════════════════
   LOCAL FALLBACK (if server is down)
   ═══════════════════════════════════════════ */
let localBombIndex = -1;
let localAdjacentMap = {};
let localRevealed = new Set();
let localStats = { games_played: 0, best_streak: 0, current_streak: 0, total_wins: 0, total_losses: 0 };

function localCalculateAdjacent(bombIdx) {
  const map = {};
  for (let i = 0; i < TOTAL_CELLS; i++) {
    const r1 = Math.floor(i / GRID_SIZE), c1 = i % GRID_SIZE;
    const r2 = Math.floor(bombIdx / GRID_SIZE), c2 = bombIdx % GRID_SIZE;
    let count = 0;
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        if (dr === 0 && dc === 0) continue;
        const nr = r1 + dr, nc = c1 + dc;
        if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
          if (nr === r2 && nc === c2) count++;
        }
      }
    }
    map[i] = count;
  }
  return map;
}

/* ═══════════════════════════════════════════
   GAME LOGIC
   ═══════════════════════════════════════════ */
async function startNewGame() {
  // Reset UI
  gameOver = false;
  revealedCount = 0;
  gridState = new Array(TOTAL_CELLS).fill('hidden');
  adjacentMap = {};
  document.getElementById('btn-reveal').style.display = 'none';
  updateProgress();

  if (serverOnline) {
    try {
      const data = await api('/api/new-game');
      gameId = data.game_id;
      addLog(`New game: ${gameId.substring(0, 8)}...`, 'success');
    } catch (e) {
      addLog('Failed to start server game, falling back to local', 'error');
      serverOnline = false;
      startLocalGame();
      return;
    }
  } else {
    startLocalGame();
  }

  buildGrid();
  checkServerStats();
}

function startLocalGame() {
  localBombIndex = Math.floor(Math.random() * TOTAL_CELLS);
  localAdjacentMap = localCalculateAdjacent(localBombIndex);
  localRevealed = new Set();
  localStats.games_played++;
  addLog(`Local game started, bomb at hidden position`, 'info');
}

async function revealCell(index) {
  if (gameOver || gridState[index] === 'revealed') return;

  const cell = document.querySelector(`.cell[data-index="${index}"]`);
  if (!cell) return;

  if (serverOnline) {
    try {
      const data = await api('/api/reveal', { game_id: gameId, cell_index: index });

      if (data.error) {
        showToast(data.error, 'error');
        return;
      }

      if (!data.safe) {
        // BOOM
        gridState[index] = 'bomb';
        cell.classList.add('revealed', 'bomb-hit');
        cell.innerHTML = '💣';
        burstAt(cell, ['#e94560', '#ff6b6b', '#ff4444', '#ff8800'], 40);
        gameOver = true;
        revealedCount = data.revealed_count;
        updateProgress();
        disableGrid();
        document.getElementById('btn-reveal').style.display = '';
        addLog(`BOOM at cell ${index}!`, 'error');

        setTimeout(() => {
          showModal('lose', '💥 Game Over!', 'You hit the bomb! Better luck next time.');
        }, 600);

      } else {
        // Safe
        gridState[index] = 'revealed';
        revealedCount = data.revealed_count;
        const adj = data.adjacent;
        cell.classList.add('revealed');
        const numClass = `num-${Math.min(adj, 4)}`;
        cell.innerHTML = adj > 0 ? `<span class="num ${numClass}">${adj}</span>` : '<span class="num num-0">·</span>';
        burstAt(cell, ['#4ade80', '#0f9b58', '#5bc0de'], 15);
        updateProgress();
        addLog(`Safe at ${index}, adjacent=${adj}`, 'info');

        if (data.status === 'won') {
          gameOver = true;
          disableGrid();
          celebrationBurst();
          addLog('YOU WIN! All safe cells revealed!', 'success');

          // Update best streak
          const newBest = Math.max(bestStreak + 1, bestStreak);
          bestStreak = newBest;
          localStorage.setItem('bombSweep_best', bestStreak);
          document.getElementById('best-streak').textContent = bestStreak;

          setTimeout(() => {
            showModal('win', '🎉 You Win!', 'You swept all the bombs! Here\'s your 5-Star Chocolate! 🍫⭐');
          }, 800);
        }
      }
    } catch (e) {
      addLog(`API error: ${e.message}`, 'error');
      showToast('Server error — try again', 'error');
    }
  } else {
    // ── Local mode ──
    if (index === localBombIndex) {
      gridState[index] = 'bomb';
      cell.classList.add('revealed', 'bomb-hit');
      cell.innerHTML = '💣';
      burstAt(cell, ['#e94560', '#ff6b6b', '#ff4444', '#ff8800'], 40);
      gameOver = true;
      localRevealed.add(index);
      revealedCount = localRevealed.size;
      updateProgress();
      disableGrid();
      document.getElementById('btn-reveal').style.display = '';
      localStats.total_losses++;
      localStats.current_streak = 0;
      addLog(`BOOM at cell ${index} (local)!`, 'error');

      setTimeout(() => {
        showModal('lose', '💥 Game Over!', 'You hit the bomb! Better luck next time.');
      }, 600);
    } else {
      gridState[index] = 'revealed';
      localRevealed.add(index);
      revealedCount = localRevealed.size;
      const adj = localAdjacentMap[index];
      cell.classList.add('revealed');
      const numClass = `num-${Math.min(adj, 4)}`;
      cell.innerHTML = adj > 0 ? `<span class="num ${numClass}">${adj}</span>` : '<span class="num num-0">·</span>';
      burstAt(cell, ['#4ade80', '#0f9b58', '#5bc0de'], 15);
      updateProgress();
      addLog(`Safe at ${index}, adjacent=${adj} (local)`, 'info');

      if (localRevealed.size >= TOTAL_SAFE) {
        gameOver = true;
        disableGrid();
        localStats.total_wins++;
        localStats.current_streak++;
        if (localStats.current_streak > localStats.best_streak) {
          localStats.best_streak = localStats.current_streak;
        }
        bestStreak = Math.max(bestStreak, localStats.best_streak);
        localStorage.setItem('bombSweep_best', bestStreak);
        document.getElementById('best-streak').textContent = bestStreak;
        document.getElementById('current-streak').textContent = localStats.current_streak;

        celebrationBurst();
        addLog('YOU WIN! (local)', 'success');

        setTimeout(() => {
          showModal('win', '🎉 You Win!', 'You swept all the bombs! Here\'s your 5-Star Chocolate! 🍫⭐');
        }, 800);
      }
    }
  }
}

async function revealAllCells() {
  if (serverOnline && gameId) {
    try {
      const data = await api('/api/reveal-all', { game_id: gameId });
      if (data.error) { showToast(data.error, 'error'); return; }

      data.bomb_indices.forEach(bi => {
        if (gridState[bi] !== 'bomb') {
          gridState[bi] = 'bomb';
          const cell = document.querySelector(`.cell[data-index="${bi}"]`);
          if (cell) {
            cell.classList.add('revealed', 'bomb-reveal');
            cell.innerHTML = '💣';
          }
        }
      });

      for (let i = 0; i < TOTAL_CELLS; i++) {
        if (gridState[i] === 'hidden') {
          gridState[i] = 'revealed';
          const cell = document.querySelector(`.cell[data-index="${i}"]`);
          if (cell) {
            cell.classList.add('revealed', 'safe-reveal-end');
            const adj = data.cell_map[i].adjacent;
            const numClass = `num-${Math.min(adj, 4)}`;
            cell.innerHTML = adj > 0 ? `<span class="num ${numClass}">${adj}</span>` : '<span class="num num-0">·</span>';
          }
        }
      }

      disableGrid();
      document.getElementById('btn-reveal').style.display = 'none';
      addLog('Full board revealed', 'info');
    } catch (e) {
      addLog(`Reveal-all error: ${e.message}`, 'error');
    }
  } else {
    // Local reveal all
    for (let i = 0; i < TOTAL_CELLS; i++) {
      if (gridState[i] === 'hidden') {
        const cell = document.querySelector(`.cell[data-index="${i}"]`);
        if (!cell) continue;
        if (i === localBombIndex) {
          gridState[i] = 'bomb';
          cell.classList.add('revealed', 'bomb-reveal');
          cell.innerHTML = '💣';
        } else {
          gridState[i] = 'revealed';
          cell.classList.add('revealed', 'safe-reveal-end');
          const adj = localAdjacentMap[i];
          const numClass = `num-${Math.min(adj, 4)}`;
          cell.innerHTML = adj > 0 ? `<span class="num ${numClass}">${adj}</span>` : '<span class="num num-0">·</span>';
        }
      }
    }
    disableGrid();
    document.getElementById('btn-reveal').style.display = 'none';
  }
}

/* ═══════════════════════════════════════════
   UI HELPERS
   ═══════════════════════════════════════════ */
function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let i = 0; i < TOTAL_CELLS; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;
    cell.tabIndex = 0;
    cell.setAttribute('role', 'button');
    cell.setAttribute('aria-label', `Cell ${Math.floor(i / GRID_SIZE) + 1}, ${(i % GRID_SIZE) + 1}`);

    cell.addEventListener('click', () => revealCell(i));
    cell.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        revealCell(i);
      }
    });

    grid.appendChild(cell);
  }
}

function disableGrid() {
  document.querySelectorAll('.cell').forEach(c => c.classList.add('disabled'));
}

function updateProgress() {
  const pct = Math.min(100, (revealedCount / TOTAL_SAFE) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${revealedCount} / ${TOTAL_SAFE}`;
}

async function checkServerStats() {
  if (!serverOnline) {
    document.getElementById('games-played').textContent = localStats.games_played;
    document.getElementById('current-streak').textContent = localStats.current_streak;
    return;
  }
  try {
    const data = await fetch('/api/stats').then(r => r.json());
    document.getElementById('best-streak').textContent = Math.max(data.best_streak || 0, bestStreak);
    document.getElementById('current-streak').textContent = data.current_streak || 0;
    document.getElementById('games-played').textContent = data.games_played || 0;
  } catch (e) { /* ignore */ }
}

function showToast(msg, type = '') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3200);
}

function showModal(type, title, text) {
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');
  modal.className = `modal ${type}`;
  document.getElementById('modal-emoji').textContent = type === 'win' ? '🍫⭐' : '💥';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;
  overlay.classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ═══════════════════════════════════════════
   ACTIVITY LOG
   ═══════════════════════════════════════════ */
function addLog(msg, type = '') {
  const body = document.getElementById('log-body');
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  const time = new Date().toLocaleTimeString();
  entry.textContent = `[${time}] ${msg}`;
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}

function toggleLog() {
  document.getElementById('log-panel').classList.toggle('open');
}

function clearLog() {
  document.getElementById('log-body').innerHTML = '';
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
(async function init() {
  addLog('Bomb Sweep initializing...', 'info');
  await checkServer();
  await startNewGame();
})();
</script>
