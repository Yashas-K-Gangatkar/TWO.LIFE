<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bomb Sweep</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d0d1a;--surface:#1a1a2e;--surface-light:#22223a;--accent:#e94560;--accent-glow:rgba(233,69,96,.4);--safe:#0f9b58;--gold:#ffd700;--text:#eaeaea;--text-muted:#8888aa;--border:#333355;--cell-bg:#2a2a4a;--cell-hover:#3a3a5e;--cell-revealed:#151528;--radius:8px}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  #bg-canvas,#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
  #particle-canvas{z-index:90}
  .app{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px 48px;min-height:100vh}
  .header{text-align:center;margin-bottom:16px}
  .header h1{font-size:2.4rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--accent),#ff6b6b,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
  .header p{color:var(--text-muted);font-size:.9rem;margin-top:6px}
  .python-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(55,118,171,.2);color:#4B8BBE;border:1px solid rgba(55,118,171,.4);padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:8px}
  .status-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:12px;font-size:.85rem}
  .status-item{display:flex;align-items:center;gap:6px;background:var(--surface);padding:5px 12px;border-radius:20px;border:1px solid var(--border)}
  .status-item .icon{font-size:1.05rem}.status-item .label{color:var(--text-muted)}.status-item .value{font-weight:700}
  .lives-display{display:flex;gap:6px;align-items:center;background:var(--surface);padding:5px 14px;border-radius:20px;border:1px solid var(--border)}
  .lives-display .heart{font-size:1.3rem;transition:all .4s ease}
  .lives-display .heart.alive{color:var(--accent);filter:drop-shadow(0 0 6px var(--accent-glow))}
  .lives-display .heart.dead{color:#444;filter:none;transform:scale(.8);opacity:.5}
  .lives-display .heart.breaking{animation:heart-break .6s ease forwards}
  @keyframes heart-break{0%{transform:scale(1.3);color:red}30%{transform:scale(1.6);color:#f44}60%{transform:scale(.7);color:#666}100%{transform:scale(.8);color:#444;opacity:.5}}
  .progress-wrapper{width:100%;max-width:480px;margin-bottom:12px}
  .progress-label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--text-muted);margin-bottom:4px}
  .progress-track{width:100%;height:10px;background:var(--surface);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--safe),#4ade80,var(--gold));border-radius:10px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
  .grid-container{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;width:100%;max-width:480px;aspect-ratio:1}
  .cell{position:relative;background:var(--cell-bg);border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;user-select:none;-webkit-tap-highlight-color:transparent;perspective:600px;overflow:hidden}
  .cell::before{content:'';position:absolute;inset:0;border-radius:var(--radius);opacity:0;transition:opacity .2s;background:radial-gradient(circle at center,rgba(255,255,255,.08),transparent 70%)}
  .cell:hover:not(.revealed):not(.disabled)::before{opacity:1}
  .cell:hover:not(.revealed):not(.disabled){background:var(--cell-hover);border-color:rgba(255,255,255,.1);transform:translateY(-2px)}
  .cell:active:not(.revealed):not(.disabled){transform:scale(.95)}
  .cell.revealed{background:var(--cell-revealed);cursor:default;animation:cell-reveal .4s ease forwards}
  @keyframes cell-reveal{0%{transform:rotateY(90deg) scale(.8);opacity:.5}50%{transform:rotateY(-5deg) scale(1.02)}100%{transform:rotateY(0) scale(1);opacity:1}}
  .cell.bomb-hit{background:rgba(233,69,96,.25)!important;border-color:var(--accent)!important;animation:bomb-shake .6s ease}
  @keyframes bomb-shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-6px) rotate(-2deg)}20%{transform:translateX(6px) rotate(2deg)}30%{transform:translateX(-5px) rotate(-1deg)}40%{transform:translateX(5px) rotate(1deg)}50%{transform:translateX(-3px)}60%{transform:translateX(3px)}}
  .cell.bomb-reveal{background:rgba(233,69,96,.12)!important;border-color:rgba(233,69,96,.3)!important}
  .cell.safe-reveal-end{background:rgba(233,69,96,.05);border-color:rgba(233,69,96,.15)}
  .cell.disabled{pointer-events:none}
  .cell.shuffling{animation:shuffle-flip .15s ease}
  @keyframes shuffle-flip{0%{transform:rotateY(0) scale(1);background:var(--cell-bg)}50%{transform:rotateY(90deg) scale(.9);background:#3a3a5e}100%{transform:rotateY(0) scale(1);background:var(--cell-bg)}}
  .cell.shuffle-highlight{background:linear-gradient(135deg,#e94560,#ff6b6b,#ffd700)!important;animation:shuffle-glow .3s ease}
  @keyframes shuffle-glow{0%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.1);filter:brightness(1.5)}100%{transform:scale(1);filter:brightness(1)}}
  .cell.bomb-preview{background:rgba(233,69,96,.3)!important;border-color:var(--accent)!important;animation:bomb-pulse 1.2s ease infinite}
  @keyframes bomb-pulse{0%,100%{box-shadow:0 0 8px rgba(233,69,96,.4)}50%{box-shadow:0 0 20px rgba(233,69,96,.8)}}
  .cell .num{font-size:1rem;font-weight:800}
  .num-1{color:#5bc0de}.num-2{color:#5cb85c}.num-3{color:#f0ad4e}.num-4{color:#e94560}.num-5{color:#c084fc}.num-6{color:#818cf8}.num-7{color:#f472b6}.num-8{color:#fb923c}
  .num-0{color:rgba(255,255,255,.1);font-size:.8rem}
  .actions{margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .btn{padding:10px 24px;border:none;border-radius:30px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s ease;display:inline-flex;align-items:center;gap:8px}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px var(--accent-glow)}
  .btn-secondary{background:var(--surface-light);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--cell-hover);transform:translateY(-1px)}
  .btn-shuffle{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;box-shadow:0 4px 20px rgba(255,215,0,.3)}
  .btn-shuffle:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,215,0,.5)}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease}
  .modal-overlay.active{opacity:1;pointer-events:auto}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;text-align:center;max-width:380px;width:90%;transform:scale(.8) translateY(20px);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
  .modal-overlay.active .modal{transform:scale(1) translateY(0)}
  .modal .emoji{font-size:3.5rem;margin-bottom:14px;display:block}
  .modal h2{font-size:1.7rem;font-weight:900;margin-bottom:8px}
  .modal.win h2{color:var(--gold)}.modal.lose h2{color:var(--accent)}
  .modal p{color:var(--text-muted);font-size:.9rem;margin-bottom:20px;line-height:1.5}
  .modal .lives-summary{display:flex;justify-content:center;gap:8px;margin-bottom:16px;font-size:1.6rem}
  .toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.85rem;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.4);animation:toast-in .4s ease,toast-out .3s ease 2.7s forwards;max-width:300px}
  .toast.error{border-color:var(--accent)}.toast.success{border-color:var(--safe)}.toast.warning{border-color:#f0ad4e}
  @keyframes toast-in{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
  .screen-flash{position:fixed;inset:0;z-index:80;pointer-events:none;background:rgba(233,69,96,.3);animation:screen-flash .5s ease forwards}
  @keyframes screen-flash{0%{opacity:1}100%{opacity:0}}
  .phase-banner{background:linear-gradient(135deg,var(--accent),#ff6b6b);color:#fff;padding:8px 24px;border-radius:30px;font-size:.85rem;font-weight:700;margin-bottom:12px;text-align:center;animation:banner-pulse 2s ease infinite}
  @keyframes banner-pulse{0%,100%{opacity:1}50%{opacity:.8}}
  .phase-banner.shuffle-phase{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000}

  /* LOADING SCREEN */
  #loading-overlay{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease}
  #loading-overlay.hidden{opacity:0;pointer-events:none}
  .load-logo{position:relative;width:120px;height:120px;margin-bottom:24px}
  .load-logo .bomb-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:4rem;opacity:0;animation:logo-appear .6s ease .3s forwards}
  @keyframes logo-appear{0%{opacity:0;transform:scale(0) rotate(-180deg)}60%{opacity:1;transform:scale(1.2) rotate(10deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
  .load-logo .string-ring{position:absolute;inset:-10px;border:3px solid transparent;border-top-color:var(--accent);border-right-color:var(--gold);border-radius:50%;opacity:0;animation:string-spin 1.2s linear .5s infinite,ring-appear .4s ease .2s forwards}
  @keyframes string-spin{to{transform:rotate(360deg)}}
  @keyframes ring-appear{to{opacity:1}}
  .load-logo .string-ring-2{position:absolute;inset:-20px;border:2px solid transparent;border-bottom-color:var(--safe);border-left-color:#5bc0de;border-radius:50%;opacity:0;animation:string-spin-r 1.8s linear .7s infinite,ring-appear .4s ease .4s forwards}
  @keyframes string-spin-r{to{transform:rotate(-360deg)}}
  .load-title{font-size:2.8rem;font-weight:900;letter-spacing:-1px;min-height:3.5rem;background:linear-gradient(135deg,var(--accent),#ff6b6b,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .load-title .cursor{display:inline-block;width:3px;height:2.6rem;background:var(--accent);margin-left:2px;animation:cursor-blink .6s step-end infinite;vertical-align:text-bottom}
  @keyframes cursor-blink{0%,100%{opacity:1}50%{opacity:0}}
  .load-subtitle{color:var(--text-muted);font-size:.95rem;margin-top:8px;opacity:0;transition:opacity .5s ease}
  .load-subtitle.visible{opacity:1}
  .load-bar-track{width:200px;height:4px;background:var(--surface);border-radius:4px;margin-top:24px;overflow:hidden;opacity:0;transition:opacity .4s ease}
  .load-bar-track.visible{opacity:1}
  .load-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:4px;transition:width .3s ease}
  .load-python-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(55,118,171,.2);color:#4B8BBE;border:1px solid rgba(55,118,171,.4);padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:16px;opacity:0;transition:opacity .4s ease}
  .load-python-tag.visible{opacity:1}

  @media(max-width:520px){.header h1{font-size:1.7rem}.grid-container{gap:2px;max-width:340px}.cell{font-size:.8rem;border-radius:4px}.cell .num{font-size:.8rem}.status-bar{gap:6px}.status-item,.lives-display{padding:4px 10px;font-size:.78rem}.modal{padding:24px 16px}.load-title{font-size:2rem;min-height:2.6rem}.load-title .cursor{height:2rem}}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading-overlay">
  <div class="load-logo">
    <div class="bomb-icon">&#x1F4A3;</div>
    <div class="string-ring"></div>
    <div class="string-ring-2"></div>
  </div>
  <div class="load-title" id="load-title"><span class="cursor"></span></div>
  <div class="load-subtitle" id="load-subtitle">5 Bombs. Memorize. Shuffle. Survive.</div>
  <div class="load-bar-track" id="load-bar-track"><div class="load-bar-fill" id="load-bar-fill"></div></div>
  <div class="load-python-tag" id="load-python-tag">&#x1F40D; Python Engine</div>
</div>

<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<div class="app">
  <div class="header">
    <h1>BOMB SWEEP</h1>
    <p>Memorize the bombs, then shuffle and play!</p>
    <span class="python-badge">&#x1F40D; Powered by Python</span>
  </div>
  <div class="phase-banner" id="phase-banner">&#x1F4A3; MEMORIZE PHASE &mdash; Remember the 5 bomb locations!</div>
  <div class="status-bar">
    <div class="lives-display" id="lives-display">
      <span class="heart alive" id="heart-0">&#10084;&#65039;</span>
    </div>
    <div class="status-item"><span class="icon">&#x1F4A3;</span><span class="label">Bombs:</span><span class="value" id="bombs-left">5</span></div>
    <div class="status-item"><span class="icon">&#x1F3C6;</span><span class="label">Best:</span><span class="value" id="best-streak">0</span></div>
    <div class="status-item"><span class="icon">&#x1F525;</span><span class="label">Streak:</span><span class="value" id="current-streak">0</span></div>
  </div>
  <div class="progress-wrapper">
    <div class="progress-label"><span>Safe cells revealed</span><span id="progress-text">0 / 95</span></div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="grid-container" id="grid"></div>
  <div class="actions">
    <button class="btn btn-primary" id="btn-new">&#x1F4A3; New Game</button>
    <button class="btn btn-shuffle" id="btn-shuffle" style="display:none">&#x1F500; Shuffle &amp; Play!</button>
    <button class="btn btn-secondary" id="btn-reveal" style="display:none">&#x1F441; Reveal Board</button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <span class="emoji" id="modal-emoji">&#x1F36B;</span>
    <h2 id="modal-title">You Win!</h2>
    <div class="lives-summary" id="modal-lives"></div>
    <p id="modal-text">You swept all the bombs!</p>
    <button class="btn btn-primary" id="btn-play-again">Play Again</button>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
(function(){
  "use strict";

  var GRID_SIZE = 10;
  var TOTAL_CELLS = 100;
  var NUM_BOMBS = 5;
  var TOTAL_SAFE = 95;
  var MAX_LIVES = 1;

  // ═══ GAME STATE ═══
  var bombIndices = [];
  var adjacentMap = {};
  var revealed = {};
  var lives = MAX_LIVES;
  var status = "idle";    // idle | memorize | playing | won | lost
  var starting = false;
  var stats = { currentStreak: 0, bestStreak: 0 };

  // ═══ DOM HELPERS ═══
  function $(id){ return document.getElementById(id); }

  function isRevealed(idx){
    return revealed.hasOwnProperty(String(idx));
  }

  function countSafeRevealed(){
    var count = 0;
    for(var k in revealed){
      if(revealed.hasOwnProperty(k) && !revealed[k].isBomb) count++;
    }
    return count;
  }

  function countBombsFound(){
    var count = 0;
    for(var k in revealed){
      if(revealed.hasOwnProperty(k) && revealed[k].isBomb) count++;
    }
    return count;
  }

  function updateLivesUI(newLives, breakIdx){
    for(var i=0;i<MAX_LIVES;i++){
      var h = $("heart-"+i);
      if(!h) continue;
      if(i < newLives){
        h.className = "heart alive";
      } else if(i === breakIdx){
        h.className = "heart breaking";
        (function(el){ setTimeout(function(){ el.className="heart dead"; },700); })(h);
      } else {
        h.className = "heart dead";
      }
    }
  }

  function resetLivesUI(){
    for(var i=0;i<MAX_LIVES;i++){
      var h = $("heart-"+i);
      if(h) h.className = "heart alive";
    }
  }

  function updateProgress(){
    var safe = countSafeRevealed();
    var pct = Math.min(100, (safe / TOTAL_SAFE) * 100);
    $("progress-fill").style.width = pct + "%";
    $("progress-text").textContent = safe + " / " + TOTAL_SAFE;
  }

  function updateStats(){
    var best = parseInt(localStorage.getItem("bombSweep_best")) || 0;
    stats.bestStreak = best;
    $("best-streak").textContent = stats.bestStreak;
    $("current-streak").textContent = stats.currentStreak;
  }

  function saveStats(){
    if(stats.bestStreak > parseInt(localStorage.getItem("bombSweep_best")) || 0){
      localStorage.setItem("bombSweep_best", String(stats.bestStreak));
    }
  }

  function getNumClass(adj){ return "num-" + Math.min(adj, 8); }

  function disableGrid(){
    var cells = document.querySelectorAll(".cell");
    for(var i=0;i<cells.length;i++) cells[i].classList.add("disabled");
  }

  function enableGrid(){
    var cells = document.querySelectorAll(".cell");
    for(var i=0;i<cells.length;i++) cells[i].classList.remove("disabled");
  }

  function showToast(msg, type){
    var c = $("toast-container");
    var t = document.createElement("div");
    t.className = "toast " + (type||"");
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 3200);
  }

  function showModal(type, title, text){
    var overlay = $("modal-overlay");
    var modal = $("modal");
    modal.className = "modal " + type;
    var ld = $("modal-lives");
    ld.innerHTML = "";
    for(var i=0;i<MAX_LIVES;i++){
      var s = document.createElement("span");
      s.textContent = "\u2764\ufe0f";
      if(i >= lives){ s.style.opacity="0.3"; s.style.filter="grayscale(1)"; }
      ld.appendChild(s);
    }
    if(type==="win"){
      $("modal-emoji").textContent = "\ud83c\udf6b\u2b50";
    } else {
      $("modal-emoji").textContent = "\ud83d\udca5";
    }
    $("modal-title").textContent = title;
    $("modal-text").textContent = text;
    overlay.classList.add("active");
  }

  function closeModal(){
    $("modal-overlay").classList.remove("active");
  }

  // ═══════════════════════════════════════════════════════════
  // GAME ENGINE
  // ═══════════════════════════════════════════════════════════

  function placeBombs(){
    var indices = [];
    for(var i=0;i<TOTAL_CELLS;i++) indices.push(i);
    for(var i=indices.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
    }
    bombIndices = indices.slice(0, NUM_BOMBS);
  }

  function calculateAdjacent(){
    adjacentMap = {};
    for(var ci=0;ci<TOTAL_CELLS;ci++){
      var row = Math.floor(ci / GRID_SIZE), col = ci % GRID_SIZE;
      var count = 0;
      for(var dr=-1;dr<=1;dr++){
        for(var dc=-1;dc<=1;dc++){
          if(dr===0 && dc===0) continue;
          var nr = row + dr, nc = col + dc;
          if(nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE){
            var ni = nr * GRID_SIZE + nc;
            if(bombIndices.indexOf(ni) !== -1) count++;
          }
        }
      }
      adjacentMap[ci] = count;
    }
  }

  function revealCell(cellIndex){
    if(status !== "playing"){
      return {safe:false, status:status, lives:lives, error:"Game not in progress"};
    }
    if(isRevealed(cellIndex)){
      return {safe:false, status:status, lives:lives, error:"Already revealed"};
    }
    if(cellIndex < 0 || cellIndex >= TOTAL_CELLS){
      return {safe:false, status:status, lives:lives, error:"Invalid cell"};
    }

    var isBomb = bombIndices.indexOf(cellIndex) !== -1;
    var adj = adjacentMap[cellIndex] || 0;

    revealed[String(cellIndex)] = {isBomb: isBomb, adjacent: adj};

    if(isBomb){
      lives--;
      if(lives <= 0){
        status = "lost";
        stats.currentStreak = 0;
        saveStats();
        return {safe:false, status:"lost", lives:0, bomb_index:cellIndex, adjacent:adj};
      }
      return {safe:false, status:"playing", lives:lives, bomb_index:cellIndex, adjacent:adj};
    }

    var safeRevealed = countSafeRevealed();
    if(safeRevealed >= TOTAL_SAFE){
      status = "won";
      stats.currentStreak++;
      if(stats.currentStreak > stats.bestStreak) stats.bestStreak = stats.currentStreak;
      saveStats();
      return {safe:true, status:"won", lives:lives, adjacent:adj};
    }

    return {safe:true, status:"playing", lives:lives, adjacent:adj};
  }

  function getRevealAllData(){
    var cells = {};
    for(var i=0;i<TOTAL_CELLS;i++){
      cells[i] = {
        is_bomb: bombIndices.indexOf(i) !== -1,
        adjacent: adjacentMap[i] || 0,
        revealed: isRevealed(i)
      };
    }
    return {status:status, bomb_indices:bombIndices.slice(), cells:cells};
  }

  // ═══ BUILD GRID ═══
  function buildGrid(){
    var grid = $("grid");
    grid.innerHTML = "";
    for(var i=0;i<TOTAL_CELLS;i++){
      var cell = document.createElement("div");
      cell.className = "cell";
      cell.id = "cell-" + i;
      cell.setAttribute("tabindex", "0");
      cell.setAttribute("role", "button");
      (function(idx){
        cell.addEventListener("click", function(e){
          e.preventDefault();
          onCellClick(idx);
        });
      })(i);
      grid.appendChild(cell);
    }
  }

  // ═══ SHOW BOMB PREVIEW (Memorize Phase) ═══
  function showBombPreview(){
    for(var i=0;i<bombIndices.length;i++){
      var cell = $("cell-" + bombIndices[i]);
      if(cell){
        cell.classList.add("bomb-preview");
        cell.textContent = "\ud83d\udca3";
      }
    }
  }

  function clearBombPreview(){
    var cells = document.querySelectorAll(".cell.bomb-preview");
    for(var i=0;i<cells.length;i++){
      cells[i].classList.remove("bomb-preview");
      cells[i].textContent = "";
    }
  }

  // ═══ CELL CLICK HANDLER ═══
  function onCellClick(cellIndex){
    if(status !== "playing" || starting) return;
    if(isRevealed(cellIndex)) return;

    var cell = $("cell-" + cellIndex);
    if(!cell) return;

    var result = revealCell(cellIndex);
    handleRevealResult(cell, cellIndex, result);
  }

  function handleRevealResult(cell, cellIndex, result){
    if(result.error && result.status !== "lost" && result.status !== "won"){
      showToast(result.error, "error");
      return;
    }

    if(!result.safe){
      cell.classList.add("revealed", "bomb-hit");
      cell.textContent = "\ud83d\udca3";
      jsBurstAt("cell-"+cellIndex, ["#e94560","#ff6b6b","#ff4444","#ff8800"], 40);
      jsScreenFlash();

      var bombsRemaining = NUM_BOMBS - countBombsFound();
      $("bombs-left").textContent = bombsRemaining;

      if(result.status === "lost"){
        updateLivesUI(0, 0);
        updateProgress();
        disableGrid();
        $("btn-reveal").style.display = "";
        setTimeout(function(){
          showModal("lose", "Game Over!", "You hit a bomb! Better luck next time!");
        }, 800);
      } else {
        updateProgress();
      }

    } else {
      cell.classList.add("revealed");
      var adj = result.adjacent || 0;
      if(adj > 0){
        cell.innerHTML = '<span class="num ' + getNumClass(adj) + '">' + adj + '</span>';
      } else {
        cell.innerHTML = '<span class="num num-0">\u00b7</span>';
      }
      jsBurstAt("cell-"+cellIndex, ["#4ade80","#0f9b58","#5bc0de"], 12);
      updateProgress();

      if(result.status === "won"){
        disableGrid();
        updateStats();
        jsCelebrationBurst();
        var lw = lives === 1 ? "life" : "lives";
        var msg = "You swept all bombs with " + lives + " " + lw + " left!";
        setTimeout(function(){ showModal("win", "You Win!", msg); }, 800);
      }
    }
  }

  // ═══ REVEAL ALL (after game over) ═══
  function revealAll(){
    var board = getRevealAllData();
    for(var bi=0;bi<board.bomb_indices.length;bi++){
      var idx = board.bomb_indices[bi];
      var cell = $("cell-"+idx);
      if(cell && !cell.classList.contains("bomb-hit")){
        cell.classList.add("revealed", "bomb-reveal");
        cell.textContent = "\ud83d\udca3";
      }
    }
    for(var i=0;i<TOTAL_CELLS;i++){
      var c = $("cell-"+i);
      if(!c || c.classList.contains("revealed")) continue;
      c.classList.add("revealed", "safe-reveal-end");
      var adj = board.cells[i].adjacent;
      if(adj > 0){
        c.innerHTML = '<span class="num ' + getNumClass(adj) + '">' + adj + '</span>';
      } else {
        c.innerHTML = '<span class="num num-0">\u00b7</span>';
      }
    }
    disableGrid();
    $("btn-reveal").style.display = "none";
  }

  // ═══ SHUFFLE ANIMATION ═══
  function shuffleAnimation(callback){
    starting = true;
    var cells = document.querySelectorAll(".cell");
    var total = cells.length;
    if(total === 0){ starting = false; if(callback) callback(); return; }

    // Phase 1: Wave Flip (2 rounds)
    var maxDelay = 0;
    for(var round=0;round<2;round++){
      for(var i=0;i<total;i++){
        (function(idx, rnd){
          var row = Math.floor(idx/GRID_SIZE), col = idx%GRID_SIZE;
          var delay = (row+col)*30 + rnd*300;
          if(delay + 150 > maxDelay) maxDelay = delay + 150;
          setTimeout(function(){
            if(cells[idx]){
              cells[idx].classList.add("shuffling");
              setTimeout(function(){ cells[idx].classList.remove("shuffling"); }, 150);
            }
          }, delay);
        })(i, round);
      }
    }

    // Phase 2: Random Sparkle
    setTimeout(function(){
      for(var j=0;j<15;j++){
        (function(jj){
          var idx = Math.floor(Math.random()*total);
          setTimeout(function(){
            if(cells[idx]){
              cells[idx].classList.add("shuffle-highlight");
              setTimeout(function(){ cells[idx].classList.remove("shuffle-highlight"); }, 300);
            }
          }, jj*50);
        })(j);
      }

      // Phase 3: Settle Wave
      setTimeout(function(){
        for(var i=0;i<total;i++){
          (function(idx){
            var row = Math.floor(idx/GRID_SIZE), col = idx%GRID_SIZE;
            var delay = (row+col)*20;
            setTimeout(function(){
              if(cells[idx]){
                cells[idx].style.transform = "scale(0.9)";
                setTimeout(function(){ cells[idx].style.transform = ""; }, 100);
              }
            }, delay);
          })(i);
        }
        setTimeout(function(){
          starting = false;
          if(callback) callback();
        }, 500);
      }, 800);
    }, maxDelay + 100);
  }

  // ═══ START NEW GAME (Memorize Phase) ═══
  function startNewGame(){
    closeModal();
    placeBombs();
    calculateAdjacent();

    // Reset game state
    revealed = {};
    lives = MAX_LIVES;
    status = "memorize";

    $("btn-reveal").style.display = "none";
    $("btn-shuffle").style.display = "none";
    $("bombs-left").textContent = NUM_BOMBS;
    resetLivesUI();
    updateStats();
    buildGrid();
    updateProgress();

    // Show bomb positions for memorize phase
    showBombPreview();

    // Update banner
    var banner = $("phase-banner");
    banner.className = "phase-banner";
    banner.innerHTML = "&#x1F4A3; MEMORIZE PHASE &mdash; Remember the " + NUM_BOMBS + " bomb locations!";

    // Show shuffle button
    $("btn-shuffle").style.display = "";
    $("btn-new").style.display = "none";

    showToast("Memorize the bomb positions!", "warning");
    console.log("[BombSweep] Memorize phase. Bombs at:", JSON.stringify(bombIndices));
  }

  // ═══ SHUFFLE & START PLAYING ═══
  function shuffleAndPlay(){
    if(starting) return;
    $("btn-shuffle").style.display = "none";

    // Clear the bomb preview
    clearBombPreview();

    // Update banner
    var banner = $("phase-banner");
    banner.className = "phase-banner shuffle-phase";
    banner.innerHTML = "&#x1F500; SHUFFLING... Bombs are moving!";

    // Re-place bombs (jumble them!)
    placeBombs();
    calculateAdjacent();

    console.log("[BombSweep] Bombs shuffled to:", JSON.stringify(bombIndices));

    shuffleAnimation(function(){
      status = "playing";
      banner.className = "phase-banner shuffle-phase";
      banner.innerHTML = "&#x1F3AE; PLAY PHASE &mdash; Avoid the bombs!";
      $("btn-new").style.display = "";
      showToast("Bombs shuffled! Good luck!", "success");
      console.log("[BombSweep] Play phase! Bombs hidden at:", bombIndices);
    });
  }

  // ═══ EVENT BINDING ═══
  function bindEvents(){
    $("btn-new").addEventListener("click", function(){
      if(!starting) startNewGame();
    });
    $("btn-shuffle").addEventListener("click", function(){
      if(!starting) shuffleAndPlay();
    });
    $("btn-reveal").addEventListener("click", revealAll);
    $("btn-play-again").addEventListener("click", function(){
      startNewGame();
    });
    $("modal-overlay").addEventListener("click", function(e){
      if(e.target === $("modal-overlay")) closeModal();
    });
  }

  // ═══ PARTICLE / CANVAS EFFECTS ═══
  var bgC = $("bg-canvas"), bgX = bgC.getContext("2d"), embers = [];
  function rBg(){ bgC.width=innerWidth; bgC.height=innerHeight; } rBg();
  addEventListener("resize", rBg);

  function Ember(){
    this.x=Math.random()*bgC.width; this.y=bgC.height+Math.random()*100;
    this.s=Math.random()*2.5+.5; this.vy=Math.random()*.5+.2;
    this.vx=(Math.random()-.5)*.3; this.o=Math.random()*.4+.1;
    this.h=Math.random()>.5?0:30;
  }
  Ember.prototype.update=function(){
    this.y-=this.vy; this.x+=this.vx+Math.sin(this.y*.01)*.2; this.o-=.0005;
    if(this.y<-10||this.o<=0){
      this.x=Math.random()*bgC.width; this.y=bgC.height+Math.random()*100;
      this.s=Math.random()*2.5+.5; this.vy=Math.random()*.5+.2;
      this.vx=(Math.random()-.5)*.3; this.o=Math.random()*.4+.1;
      this.h=Math.random()>.5?0:30;
    }
  };
  Ember.prototype.draw=function(){
    bgX.beginPath(); bgX.arc(this.x,this.y,this.s,0,Math.PI*2);
    bgX.fillStyle="hsla("+this.h+",80%,60%,"+this.o+")"; bgX.fill();
  };
  for(var _i=0;_i<60;_i++) embers.push(new Ember());
  (function bgLoop(){
    bgX.clearRect(0,0,bgC.width,bgC.height);
    for(var i=0;i<embers.length;i++){ embers[i].update(); embers[i].draw(); }
    requestAnimationFrame(bgLoop);
  })();

  var pC=$("particle-canvas"), pX=pC.getContext("2d"), pts=[];
  function rPC(){ pC.width=innerWidth; pC.height=innerHeight; } rPC();
  addEventListener("resize", rPC);

  function Particle(x,y,cl){
    this.x=x; this.y=y; this.c=cl; this.s=Math.random()*5+2;
    var a=Math.random()*Math.PI*2, sp=Math.random()*6+2;
    this.vx=Math.cos(a)*sp; this.vy=Math.sin(a)*sp; this.g=.12;
    this.l=1; this.dc=Math.random()*.02+.015;
  }
  Particle.prototype.update=function(){
    this.x+=this.vx; this.vy+=this.g; this.y+=this.vy;
    this.vx*=.98; this.l-=this.dc;
  };
  Particle.prototype.draw=function(){
    pX.globalAlpha=Math.max(0,this.l); pX.fillStyle=this.c;
    pX.beginPath(); pX.arc(this.x,this.y,this.s*this.l,0,Math.PI*2); pX.fill();
  };

  window.jsBurstAt=function(id,colors,count){
    var el=document.getElementById(id); if(!el) return;
    var rc=el.getBoundingClientRect(), cx=rc.left+rc.width/2, cy=rc.top+rc.height/2;
    for(var i=0;i<count;i++) pts.push(new Particle(cx,cy,colors[Math.floor(Math.random()*colors.length)]));
  };
  window.jsCelebrationBurst=function(){
    var cl=["#ffd700","#ff6b6b","#4ade80","#5bc0de","#f0ad4e","#e94560","#fff"];
    for(var i=0;i<250;i++){
      var x=Math.random()*innerWidth, y=innerHeight+20;
      var p=new Particle(x,y,cl[Math.floor(Math.random()*cl.length)]);
      p.vy=-(Math.random()*14+5); p.vx=(Math.random()-.5)*10; p.g=.08; p.s=Math.random()*5+2;
      pts.push(p);
    }
  };
  window.jsScreenFlash=function(){
    var f=document.createElement("div"); f.className="screen-flash";
    document.body.appendChild(f); setTimeout(function(){ f.remove(); },600);
  };
  (function pLoop(){
    pX.clearRect(0,0,pC.width,pC.height);
    pts=pts.filter(function(p){ return p.l>0; });
    for(var i=0;i<pts.length;i++){ pts[i].update(); pts[i].draw(); }
    pX.globalAlpha=1; requestAnimationFrame(pLoop);
  })();

  // ═══════════════════════════════════════════════════════════
  // LOADING SCREEN — TYPING ANIMATION
  // ═══════════════════════════════════════════════════════════

  var TITLE_TEXT = "BOMB SWEEP";
  var typeIndex = 0;
  var titleEl = $("load-title");
  var barFill = $("load-bar-fill");

  function typeNextChar(){
    if(typeIndex < TITLE_TEXT.length){
      var text = TITLE_TEXT.substring(0, typeIndex + 1);
      titleEl.innerHTML = text + '<span class="cursor"></span>';
      typeIndex++;
      barFill.style.width = ((typeIndex / TITLE_TEXT.length) * 50) + "%";
      var delay = 120;
      if(TITLE_TEXT[typeIndex-1] === " ") delay = 200;
      if(typeIndex === 1) delay = 300;
      setTimeout(typeNextChar, delay);
    } else {
      $("load-subtitle").classList.add("visible");
      setTimeout(function(){
        $("load-bar-track").classList.add("visible");
        $("load-python-tag").classList.add("visible");
        animateLoadingBar();
      }, 400);
    }
  }

  function animateLoadingBar(){
    var current = 50;
    function step(){
      if(current < 100){
        current = Math.min(current + 3, 100);
        barFill.style.width = current + "%";
        setTimeout(step, 40);
      } else {
        setTimeout(dismissLoading, 200);
      }
    }
    step();
  }

  function dismissLoading(){
    var overlay = $("loading-overlay");
    if(overlay){
      overlay.classList.add("hidden");
      setTimeout(function(){ if(overlay.parentNode) overlay.remove(); }, 800);
    }
    bindEvents();
    updateStats();
    startNewGame();
  }

  // Start typing animation
  setTimeout(typeNextChar, 800);

})();
</script>
